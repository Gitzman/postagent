name: Build & Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-22.04
            artifact: postagent-linux-amd64
          - os: ubuntu-24.04
            artifact: postagent-linux-amd64-ubuntu24
          - os: macos-latest
            artifact: postagent-macos-arm64
          - os: windows-latest
            artifact: postagent-windows-amd64.exe

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install .
          pip install pyinstaller

      - name: Build binary
        shell: bash
        run: |
          pyinstaller --onefile --name ${{ matrix.artifact }} --clean \
            --hidden-import _cffi_backend \
            --hidden-import nacl._sodium \
            --hidden-import nacl.bindings \
            --collect-all nacl \
            postagent/cli/main.py

      - name: Smoke test
        shell: bash
        run: ./dist/${{ matrix.artifact }} --help

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/${{ matrix.artifact }}

  pypi:
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/postagent
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tools
        run: pip install build

      - name: Build package
        run: python -m build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

  release:
    needs: [build, pypi]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: artifacts/**/*
