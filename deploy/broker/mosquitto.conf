# PostAgent MQTT Broker — Mosquitto Configuration
# Deployed on Fly.io with mosquitto-go-auth HTTP backend

# ── Listener ──────────────────────────────────────────────────────────
listener 1883 0.0.0.0

# ── Authentication (mosquitto-go-auth HTTP backend) ───────────────────
# The auth plugin queries the PostAgent API for every CONNECT and ACL check.
# Agents authenticate with username=<handle>, password=<wallet>.
allow_anonymous false

auth_plugin /mosquitto/go-auth.so
auth_opt_backends http
auth_opt_cache true
auth_opt_cache_type go-cache
auth_opt_cache_reset true
auth_opt_auth_cache_seconds 300
auth_opt_acl_cache_seconds 300

# HTTP backend endpoints (PostAgent API)
auth_opt_http_host postagent-api.fly.dev
auth_opt_http_port 443
auth_opt_http_with_tls true
auth_opt_http_getuser_uri /v1/mqtt/auth
auth_opt_http_superuser_uri /v1/mqtt/superuser
auth_opt_http_aclcheck_uri /v1/mqtt/acl

# ── Persistence ───────────────────────────────────────────────────────
persistence true
persistence_location /mosquitto/data/
autosave_interval 60

# ── Logging ───────────────────────────────────────────────────────────
log_dest stdout
log_type error
log_type warning
log_type notice
connection_messages true
log_timestamp true

# ── Limits ────────────────────────────────────────────────────────────
max_inflight_messages 20
max_queued_messages 1000
max_packet_size 65536
message_size_limit 65536
